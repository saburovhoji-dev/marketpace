    let lang = localStorage.getItem('lang') || 'en';
    let currentPage = 'home';
    let user = JSON.parse(localStorage.getItem('user') || 'null');
    let communityPosts = JSON.parse(localStorage.getItem('community_posts') || 'null') || [...DEFAULT_COMMUNITY_POSTS];
    let userProducts = JSON.parse(localStorage.getItem('user_products') || '[]');
    let userOrders = JSON.parse(localStorage.getItem('user_orders') || '[]');
    let balance = user ? (parseFloat(localStorage.getItem('user_balance')) || 100) : 0;
    let walletHistory = JSON.parse(localStorage.getItem('wallet_history') || '[]');

    function saveState() {
        localStorage.setItem('user', JSON.stringify(user));
        localStorage.setItem('community_posts', JSON.stringify(communityPosts));
        localStorage.setItem('user_products', JSON.stringify(userProducts));
        localStorage.setItem('user_orders', JSON.stringify(userOrders));
        if (user) localStorage.setItem('user_balance', balance.toString());
        localStorage.setItem('wallet_history', JSON.stringify(walletHistory));
    }

    // ==================== ROUTER ====================
    function navigate(page, data) {
        currentPage = page;
        render(data);
        window.scrollTo(0, 0);
    }

    function switchLang(l) {
        lang = l;
        localStorage.setItem('lang', l);
        render();
    }

    // ==================== RENDER ====================
    function render(data) {
        const app = document.getElementById('app');
        app.innerHTML = renderHeader() + renderPage(currentPage, data) + renderFooter();
        attachEvents();
    }

    function getName(item) {
        return lang === 'ru' ? item.name_ru : lang === 'uz' ? item.name_uz : item.name_en;
    }
    function getTitle(item) {
        return lang === 'ru' ? item.title_ru : lang === 'uz' ? item.title_uz : item.title_en;
    }
    function getDesc(item) {
        return lang === 'ru' ? item.desc_ru : lang === 'uz' ? item.desc_uz : item.desc_en;
    }

    function renderMarket(data) {
        const catFilter = data?.category || '';
        const searchFilter = data?.search || '';
        const typeFilter = data?.type || '';
        let filtered = PRODUCTS.filter(p => {
            if (catFilter && p.category.slug !== catFilter && CATEGORIES.find(c=>c.slug===catFilter)?.id !== p.categoryId) return false;
            if (typeFilter && p.type !== typeFilter) return false;
            if (searchFilter) {
                const q = searchFilter.toLowerCase();
                if (!p.title_en.toLowerCase().includes(q) && !p.title_ru.toLowerCase().includes(q) && !p.title_uz.toLowerCase().includes(q)) return false;
            }
            return true;
        });
        return `
        <div class="py-20 px-4 md:px-8 space-y-12">
            <div class="space-y-4">
                <h2 class="text-4xl font-headline-lg bg-gradient-to-r from-[#c2c1ff] to-[#e8b3ff] bg-clip-text text-transparent">${t('Market','title')}</h2>
                <p class="text-[#c9c5c2] font-body-md max-w-2xl">${t('Market','description')}</p>
            </div>
            <div class="flex flex-wrap gap-3 border-b border-white/10 pb-6">
                ${[{key:'',label_ru:'Все',label_uz:'Barchasi',label_en:'All'},{key:'product',label_ru:'Товары',label_uz:'Mahsulotlar',label_en:'Products'},{key:'service',label_ru:'Услуги',label_uz:'Xizmatlar',label_en:'Services'}].map(({key,label_ru,label_uz,label_en}) => {
                    const label = lang==='ru'?label_ru:lang==='uz'?label_uz:label_en;
                    const active = typeFilter === key;
                    return `<span class="px-6 py-2.5 rounded-full font-label-mono text-xs uppercase tracking-wider cursor-pointer transition-all duration-300 ${active?'bg-[#c2c1ff] text-[#1c0b9f] font-bold shadow-[0_0_20px_rgba(194,193,255,0.4)]':'text-[#c9c5c2] hover:text-white hover:bg-white/5 border border-white/10'}" onclick="navigate('market',{${catFilter?`category:'${catFilter}',`:''}${searchFilter?`search:'${searchFilter}',`:''}type:'${key}'})">${label}</span>`;

            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">

    // ==================== EVENTS ====================
    function attachEvents() {}

    function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (email && password) {
            user = { id: 1, username: email.split('@')[0], email, role: 'user' };
            saveState();
            navigate('profile');
        }
    }

    function handleRegister(e) {
        e.preventDefault();
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        if (username && email) {
            user = { id: Date.now(), username, email, role: 'user' };
            balance = 100;
            saveState();
            navigate('profile');
        }
    }

    function handleLogout() {
        user = null;
        balance = 0;
        localStorage.removeItem('user');
        localStorage.removeItem('user_balance');
        navigate('home');
    }

    function buyProduct(productId) {
        if (!user) { navigate('login'); return; }
        const product = PRODUCTS.find(p => p.id === productId);
        if (!product) return;
        if (balance < product.price) { alert('Insufficient balance! Please top up your wallet.'); return; }
        balance -= product.price;
        userOrders.unshift({ id: Date.now(), buyerId: user.id, productId: product.id, product: product, date: new Date().toLocaleDateString(), status: 'completed' });
        saveState();
        alert(`Purchase successful! You bought "${getTitle(product)}" for $${product.price}.`);
        navigate('profile');
    }

    function handleSell(e) {
        e.preventDefault();
        const title_ru = document.getElementById('sellTitleRu').value;
        const title_uz = document.getElementById('sellTitleUz').value;
        const title_en = document.getElementById('sellTitleEn').value;
        const desc_ru = document.getElementById('sellDescRu').value;
        const desc_uz = document.getElementById('sellDescUz').value;
        const desc_en = document.getElementById('sellDescEn').value;
        const price = parseFloat(document.getElementById('sellPrice').value);
        if (!title_ru || !title_uz || !title_en || !desc_ru || !desc_uz || !desc_en || !price) {
            document.getElementById('sellError').classList.remove('hidden');
            document.getElementById('sellError').textContent = 'Please fill in all required fields';
            return;
        }
        const newProduct = {
            id: Date.now(),
            sellerId: user.id,
            categoryId: parseInt(document.getElementById('sellCategory').value),
            price,
            title_ru, title_uz, title_en,
            desc_ru, desc_uz, desc_en,
            imageUrl: document.getElementById('sellImage').value || 'https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=400',
            type: document.getElementById('sellType').value,
            salesCount: 0,
            seller: { username: user.username },
            category: CATEGORIES.find(c => c.id === parseInt(document.getElementById('sellCategory').value))
        };
        userProducts.unshift(newProduct);
        PRODUCTS.push(newProduct);
        saveState();
        alert('Product listed successfully!');
        navigate('market');
    }

    function handleDeposit(e) {
        e.preventDefault();
        const amount = parseFloat(document.getElementById('depositAmount').value);
        if (isNaN(amount) || amount <= 0) {
            document.getElementById('walletError').classList.remove('hidden');
            document.getElementById('walletErrorMsg').textContent = 'Please enter a valid amount';
            return;
        }
        balance += amount;
        walletHistory.push({ amount, date: new Date().toISOString(), type: 'deposit' });
        saveState();
        document.getElementById('walletSuccess').classList.remove('hidden');
        document.getElementById('walletSuccessMsg').textContent = `Successfully deposited $${amount.toFixed(2)} to your wallet!`;
        document.getElementById('walletError').classList.add('hidden');
        // Update balance display
        const balanceEls = document.querySelectorAll('.text-5xl');
        if (balanceEls.length) balanceEls[0].innerHTML = `$${balance.toFixed(2)}`;
        setTimeout(() => navigate('wallet'), 1500);
    }

    function selectPreset(btn) {
        document.querySelectorAll('.preset-btn').forEach(b => {
            b.className = 'preset-btn py-3 rounded-xl font-label-mono text-sm font-bold border transition-all bg-white/5 border-white/10 text-white hover:bg-white/10';
        });
        btn.className = 'preset-btn py-3 rounded-xl font-label-mono text-sm font-bold border transition-all bg-[#c2c1ff] text-[#1c0b9f] border-[#c2c1ff]';
        document.getElementById('depositAmount').value = btn.dataset.amount;
    }

    function filterCommunity(btn, cat) {
        document.querySelectorAll('.community-filter').forEach(b => {
            b.className = 'community-filter px-4 py-2 rounded-full font-label-mono text-xs transition-all whitespace-nowrap border bg-white/5 border-transparent text-[#c9c5c2] hover:text-white';
        });
        btn.className = 'community-filter px-4 py-2 rounded-full font-label-mono text-xs transition-all whitespace-nowrap border bg-[#c2c1ff]/20 border-[#c2c1ff] text-[#c2c1ff] font-bold';
        document.querySelectorAll('.community-post').forEach(post => {
            if (cat === 'All' || post.dataset.cat === cat) post.style.display = '';
            else post.style.display = 'none';
        });
    }

    function handleCommunityPost(e) {
        e.preventDefault();
        const content = document.getElementById('postContent').value.trim();
        if (!content) return;
        communityPosts.unshift({
            id: Date.now(),
            username: user.username,
            avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150',
            time: 'Just now',
            content,
            likes: 0,
            hasLiked: false,
            replies: 0,
            category: document.getElementById('postCategory').value === 'All' ? 'General' : document.getElementById('postCategory').value
        });
        saveState();
        navigate('community');
    }

    function toggleLike(postId) {
        const post = communityPosts.find(p => p.id === postId);
        if (!post) return;
        post.hasLiked = !post.hasLiked;
        post.likes += post.hasLiked ? 1 : -1;
        saveState();
        navigate('community');
    }

    // ==================== INIT ====================
    render();
    </script>
</body>
</html>
